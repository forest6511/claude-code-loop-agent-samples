name: verify

on:
  pull_request:

jobs:
  verify-loop:
    runs-on: ubuntu-latest
    # SDK にセッション全体のタイムアウトはないため、
    # ジョブ側の壁時計上限が最後の安全網になる
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install claude-agent-sdk pytest pytest-cov ruff
      - name: Run verification loop
        run: python verify_loop.py --max-turns 15 --max-budget 4.0
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
